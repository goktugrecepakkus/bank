<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Banking - Admin Audit Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen font-sans">
    <nav class="bg-red-900 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-white font-bold text-xl tracking-tight">Modern Bank - ADMIN PANEL</span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="dashboard.html" class="text-red-100 hover:text-white text-sm">Back to Dashboard</a>
                    <button onclick="logout()"
                        class="bg-red-800 text-white px-3 py-2 rounded-md text-sm font-medium transition-colors hover:bg-red-700">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="px-4 py-4 sm:px-0">
            <h1 class="text-2xl font-semibold text-gray-900 mb-6">System Audit Log (Ledger)</h1>
            <div id="errorBox" class="hidden bg-red-100 text-red-700 p-4 rounded mb-4"></div>

            <div class="bg-white shadow overflow-hidden sm:rounded-lg">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Time</th>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Transaction ID</th>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Type</th>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                From Account</th>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                To Account</th>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Amount</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody" class="bg-white divide-y divide-gray-200 flex-col">
                        <!-- Logs will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user_id');
            window.location.href = 'index.html';
        }

        async function fetchLogs() {
            try {
                const response = await fetch(`http://localhost:8000/ledger/audit/all`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const logs = await response.json();
                    const tbody = document.getElementById('logTableBody');
                    tbody.innerHTML = '';

                    logs.forEach(log => {
                        const tr = document.createElement('tr');
                        // Formatting Colors depending on transaction type
                        let typeColor = 'bg-gray-100 text-gray-800';
                        if (log.transaction_type === 'TRANSFER') typeColor = 'bg-blue-100 text-blue-800';
                        if (log.transaction_type === 'DEPOSIT') typeColor = 'bg-green-100 text-green-800';

                        tr.innerHTML = `
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${new Date(log.created_at).toLocaleString()}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-xs font-mono text-gray-900">${log.transaction_id.substring(0, 8)}...</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${typeColor}">${log.transaction_type}</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-xs font-mono text-gray-500">${log.from_account_id || 'EXTERNAL_SYSTEM'}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-xs font-mono text-gray-500">${log.to_account_id}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-900">₺${log.amount}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    document.getElementById('errorBox').textContent = "Access Denied. You must be an ADMIN to view this page.";
                    document.getElementById('errorBox').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchLogs);
    </script>
</body>

</html>
