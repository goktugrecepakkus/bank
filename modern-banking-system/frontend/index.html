<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Banking - Login</title>
    <!-- Tailwind CSS for rapid styling (via CDN for simplicity in this project) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-blue-900 to-indigo-800 min-h-screen flex items-center justify-center font-sans text-gray-800">

    <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-indigo-900 mb-2">Modern Bank</h1>
        <p class="text-center text-gray-500 mb-6">Enter your credentials to access your account</p>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" required class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-sm shadow-sm placeholder-gray-400
                    focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" required class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-sm shadow-sm placeholder-gray-400
                    focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            </div>

            <div id="errorBox"
                class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative text-sm"
                role="alert"></div>

            <button type="submit"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                Sign in
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-600">
            Don't have an account? <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">Register
                here</a> (Demo)
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');

            try {
                // FastAPI's OAuth2 expects form data format (x-www-form-urlencoded)
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);

                const response = await fetch('http://localhost:8000/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    // Save token to localStorage
                    localStorage.setItem('token', result.access_token);
                    localStorage.setItem('user_id', result.user_id);
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    errorBox.textContent = result.detail || "Login failed";
                    errorBox.classList.remove('hidden');
                }
            } catch (error) {
                errorBox.textContent = "Cannot connect to server.";
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
