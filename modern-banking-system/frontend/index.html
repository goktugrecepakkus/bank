<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rykard Banking - Login</title>
    <!-- Tailwind CSS for rapid styling (via CDN for simplicity in this project) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body <body class="bg-black min-h-screen flex items-center justify-center font-sans text-gray-200"
    style="background-image: url('login_bg.png'); background-size: cover; background-position: center;">

    <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-red-600 mb-2">Rykard Bank</h1>
        <p class="text-center text-gray-400 mb-6">Enter your credentials to access your account</p>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300">Username</label>
                <input type="text" id="username" required class="mt-1 block w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white shadow-sm placeholder-gray-500
                    focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300">Password</label>
                <input type="password" id="password" required class="mt-1 block w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white shadow-sm placeholder-gray-500
                    focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300">Mother's Maiden Name</label>
                <input type="text" id="mothers_maiden_name" required class="mt-1 block w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white shadow-sm placeholder-gray-500
                    focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
            </div>

            <div id="errorBox"
                class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative text-sm"
                role="alert"></div>

            <button type="submit"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-red-700 hover:bg-red-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-600 focus:ring-offset-black transition-all duration-200">
                Sign in
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-400">
            Don't have an account? <a href="register.html"
                class="font-medium text-red-500 hover:text-red-400 transition-colors">Register
                here</a> (Demo)
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const mothers_maiden_name = document.getElementById('mothers_maiden_name').value;
            const errorBox = document.getElementById('errorBox');

            try {
                // FastAPI's OAuth2 expects form data format (x-www-form-urlencoded)
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);
                formData.append('mothers_maiden_name', mothers_maiden_name);

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    // Save token to localStorage
                    localStorage.setItem('token', result.access_token);
                    localStorage.setItem('user_id', result.user_id);
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    errorBox.textContent = result.detail || "Login failed";
                    errorBox.classList.remove('hidden');
                }
            } catch (error) {
                if (error.message === "Failed to fetch") {
                    errorBox.textContent = "Cannot connect to server. Please ensure the backend is running on http://localhost:8000";
                } else {
                    errorBox.textContent = error.message || "An unexpected error occurred.";
                }
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
