version: '3.8'

services:
  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: banking_backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql://bankadmin:securepassword@db:5432/banking_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: banking_db
    environment:
      POSTGRES_USER: bankadmin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: banking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankadmin -d banking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
