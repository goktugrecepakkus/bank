<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rykard Banking - Register</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 50, 50, 0.2);
        }
    </style>
</head>

<body class="bg-black min-h-screen flex items-center justify-center font-sans text-gray-200"
    style="background-image: url('login_bg.png'); background-size: cover; background-position: center;">

    <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-red-600 mb-2">Rykard Bank</h1>
        <p class="text-center text-gray-400 mb-6">Create a new banking account</p>

        <form id="registerForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">First Name</label>
                    <input type="text" id="first_name" required minlength="2"
                        class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white shadow-sm placeholder-gray-500 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Last Name</label>
                    <input type="text" id="last_name" required minlength="2"
                        class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white shadow-sm placeholder-gray-500 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">National ID</label>
                <input type="text" id="national_id" required minlength="9" maxlength="11"
                    class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white shadow-sm placeholder-gray-500 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Phone Number</label>
                <input type="text" id="phone_number" required minlength="10" maxlength="20"
                    class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white shadow-sm placeholder-gray-500 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Address</label>
                <input type="text" id="address" required minlength="5"
                    class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white shadow-sm placeholder-gray-500 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Username</label>
                    <input type="text" id="username" required minlength="3"
                        class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white shadow-sm placeholder-gray-500 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <input type="password" id="password" required minlength="6"
                        class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white shadow-sm placeholder-gray-500 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Mother's Maiden Name (Security
                    Question)</label>
                <input type="text" id="mothers_maiden_name" required minlength="2"
                    class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white shadow-sm placeholder-gray-500 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
            </div>

            <div id="errorBox"
                class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative text-sm"
                role="alert"></div>
            <div id="successBox"
                class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative text-sm"
                role="alert"></div>

            <button type="submit" id="submitBtn"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-red-700 hover:bg-red-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-600 focus:ring-offset-black transition-all duration-200">
                Register
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-400">
            Already have an account? <a href="index.html"
                class="font-medium text-red-500 hover:text-red-400 transition-colors">Sign in here</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const first_name = document.getElementById('first_name').value;
            const last_name = document.getElementById('last_name').value;
            const national_id = document.getElementById('national_id').value;
            const phone_number = document.getElementById('phone_number').value;
            const address = document.getElementById('address').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const mothers_maiden_name = document.getElementById('mothers_maiden_name').value;
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            const submitBtn = document.getElementById('submitBtn');

            errorBox.classList.add('hidden');
            successBox.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';

            try {
                // 1. Kullanıcıyı oluştur
                const resCustomer = await fetch('/api/customers/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        first_name, last_name, national_id, phone_number, address,
                        username, password, mothers_maiden_name, role: "customer"
                    })
                });

                let customerResult;
                const contentType = resCustomer.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    customerResult = await resCustomer.json();
                } else {
                    const errorText = await resCustomer.text();
                    console.error("Non-JSON Server Output:", errorText);
                    throw new Error("Sunucu JSON döndürmedi. Lütfen siteye Live Server yerine direkt http://localhost:8000 üzerinden (veya geçerli bir Vercel URL'sinden) bağlandığınıza emin olun. Hata detayı konsola yazıldı.");
                }

                if (!resCustomer.ok) {
                    throw new Error(customerResult.detail || "Registration failed. Username might be taken.");
                }

                // 2. Müşteri oluştu, otomatik olarak bir hesap (Checking) aç.
                const resAccount = await fetch('/api/accounts/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer_id: customerResult.id, account_type: "CHECKING" })
                });

                if (!resAccount.ok) {
                    const accErr = await resAccount.text();
                    console.error("Account Error", accErr);
                    throw new Error("User created, but failed to create default bank account. " + accErr.substring(0, 100));
                }

                successBox.textContent = "Registration successful! Redirecting to login...";
                successBox.classList.remove('hidden');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                if (error.message === "Failed to fetch") {
                    errorBox.textContent = "Cannot connect to server. Please ensure the backend is running on http://localhost:8000 (uvicorn main:app --reload)";
                } else {
                    errorBox.textContent = error.message || "An unexpected error occurred.";
                }
                errorBox.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            }
        });
    </script>
</body>

</html>
