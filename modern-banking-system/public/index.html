<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rykard Banking - Login</title>
    <!-- Tailwind CSS for rapid styling (via CDN for simplicity in this project) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: #163D2C;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body class="bg-[#0F2A1D] min-h-screen flex items-center justify-center font-sans text-[#F2F2F2]">

    <div class="glass-panel p-10 rounded-[2.5rem] w-full max-w-md border border-white/5 relative overflow-hidden">
        <!-- Decorative Glow -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-[#B08D57]/10 blur-[100px] rounded-full"></div>

        <h1 class="text-4xl font-black text-center text-[#F2F2F2] mb-2 tracking-tighter uppercase italic">Rykard<span
                class="text-[#B08D57]">Bank</span></h1>
        <p class="text-center text-[#F2F2F2]/60 mb-10 text-sm font-medium">Enter the Eternal Reserve</p>

        <form id="loginForm" class="space-y-6 relative z-10">
            <div>
                <label
                    class="block text-[10px] font-bold text-[#F2F2F2]/40 uppercase tracking-[0.2em] mb-2 ml-1">Identity</label>
                <input type="text" id="username" required placeholder="Username" class="mt-1 block w-full px-5 py-4 bg-[#0F2A1D]/50 border border-white/5 rounded-2xl text-sm text-[#F2F2F2] shadow-sm placeholder-[#F2F2F2]/20
                    focus:outline-none focus:border-[#B08D57] focus:ring-1 focus:ring-[#B08D57] transition-all">
            </div>
            <div>
                <label
                    class="block text-[10px] font-bold text-[#F2F2F2]/40 uppercase tracking-[0.2em] mb-2 ml-1">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="mt-1 block w-full px-5 py-4 bg-[#0F2A1D]/50 border border-white/5 rounded-2xl text-sm text-[#F2F2F2] shadow-sm placeholder-[#F2F2F2]/20
                    focus:outline-none focus:border-[#B08D57] focus:ring-1 focus:ring-[#B08D57] transition-all">
            </div>
            <div>
                <label
                    class="block text-[10px] font-bold text-[#F2F2F2]/40 uppercase tracking-[0.2em] mb-2 ml-1">Security
                    Question</label>
                <input type="text" id="mothers_maiden_name" required placeholder="Mother's Maiden Name" class="mt-1 block w-full px-5 py-4 bg-[#0F2A1D]/50 border border-white/5 rounded-2xl text-sm text-[#F2F2F2] shadow-sm placeholder-[#F2F2F2]/20
                    focus:outline-none focus:border-[#B08D57] focus:ring-1 focus:ring-[#B08D57] transition-all">
            </div>

            <div id="errorBox"
                class="hidden bg-red-900/20 border border-red-500/50 text-red-400 px-4 py-3 rounded-xl relative text-xs font-bold text-center"
                role="alert"></div>

            <button type="submit"
                class="w-full flex justify-center py-4 px-4 border border-transparent rounded-2xl shadow-[0_10px_20px_-10px_rgba(176,141,87,0.5)] text-sm font-black text-[#0F2A1D] bg-[#B08D57] hover:bg-[#C9A76C] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#B08D57] transition-all duration-200 uppercase tracking-widest active:scale-95">
                Open Treasury
            </button>
        </form>

        <p class="mt-8 text-center text-[10px] text-[#F2F2F2]/30 uppercase tracking-[0.1em]">
            Don't have an inheritance? <a href="register.html"
                class="font-bold text-[#B08D57] hover:underline transition-colors uppercase">Register
                here</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const mothers_maiden_name = document.getElementById('mothers_maiden_name').value;
            const errorBox = document.getElementById('errorBox');

            try {
                // FastAPI's OAuth2 expects form data format (x-www-form-urlencoded)
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);
                formData.append('mothers_maiden_name', mothers_maiden_name);

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                let result;
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    result = await response.json();
                } else {
                    const errTxt = await response.text();
                    console.error("Non-JSON Response", errTxt);
                    throw new Error("Sunucu JSON döndürmedi. Lütfen siteye Live Server yerine direkt http://localhost:8000 üzerinden girdiğinize emin olun.");
                }

                if (response.ok) {
                    // Save token to localStorage
                    localStorage.setItem('token', result.access_token);
                    localStorage.setItem('user_id', result.user_id);
                    localStorage.setItem('role', result.role);
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    if (result.traceback) {
                        console.error("BACKEND TRACEBACK:", result.traceback);
                        errorBox.textContent = "Sunucu çöktü! Hata detayı: " + result.traceback.substring(0, 300) + "...";
                    } else {
                        errorBox.textContent = result.detail || "Login failed";
                    }
                    errorBox.classList.remove('hidden');
                }
            } catch (error) {
                if (error.message === "Failed to fetch") {
                    errorBox.textContent = "Cannot connect to server. Please ensure the backend is running on http://localhost:8000";
                } else {
                    errorBox.textContent = error.message || "An unexpected error occurred.";
                }
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
