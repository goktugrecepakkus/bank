<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rykard Banking - Login</title>
    <!-- Tailwind CSS for rapid styling (via CDN for simplicity in this project) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: #FAF9F7;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>

<body class="bg-[#F5F0E6] min-h-screen flex items-center justify-center font-sans text-gray-800">

    <div class="glass-panel p-8 rounded-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-[#14B8A6] mb-2">Rykard Bank</h1>
        <p class="text-center text-gray-500 mb-6">Enter your credentials to access your account</p>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" required class="mt-1 block w-full px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm text-gray-900 shadow-sm placeholder-gray-400
                    focus:outline-none focus:border-[#14B8A6] focus:ring-1 focus:ring-[#14B8A6] transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" required class="mt-1 block w-full px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm text-gray-900 shadow-sm placeholder-gray-400
                    focus:outline-none focus:border-[#14B8A6] focus:ring-1 focus:ring-[#14B8A6] transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Mother's Maiden Name</label>
                <input type="text" id="mothers_maiden_name" required class="mt-1 block w-full px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm text-gray-900 shadow-sm placeholder-gray-400
                    focus:outline-none focus:border-[#14B8A6] focus:ring-1 focus:ring-[#14B8A6] transition-colors">
            </div>

            <div id="errorBox"
                class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded relative text-sm"
                role="alert"></div>

            <button type="submit"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-[#14B8A6] hover:bg-[#0f9688] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#14B8A6] transition-all duration-200">
                Sign in
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-500">
            Don't have an account? <a href="register.html"
                class="font-medium text-[#14B8A6] hover:text-[#0f9688] transition-colors">Register
                here</a> (Demo)
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const mothers_maiden_name = document.getElementById('mothers_maiden_name').value;
            const errorBox = document.getElementById('errorBox');

            try {
                // FastAPI's OAuth2 expects form data format (x-www-form-urlencoded)
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);
                formData.append('mothers_maiden_name', mothers_maiden_name);

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                let result;
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    result = await response.json();
                } else {
                    const errTxt = await response.text();
                    console.error("Non-JSON Response", errTxt);
                    throw new Error("Sunucu JSON döndürmedi. Lütfen siteye Live Server yerine direkt http://localhost:8000 üzerinden girdiğinize emin olun.");
                }

                if (response.ok) {
                    // Save token to localStorage
                    localStorage.setItem('token', result.access_token);
                    localStorage.setItem('user_id', result.user_id);
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    if (result.traceback) {
                        console.error("BACKEND TRACEBACK:", result.traceback);
                        errorBox.textContent = "Sunucu çöktü! Hata detayı: " + result.traceback.substring(0, 300) + "...";
                    } else {
                        errorBox.textContent = result.detail || "Login failed";
                    }
                    errorBox.classList.remove('hidden');
                }
            } catch (error) {
                if (error.message === "Failed to fetch") {
                    errorBox.textContent = "Cannot connect to server. Please ensure the backend is running on http://localhost:8000";
                } else {
                    errorBox.textContent = error.message || "An unexpected error occurred.";
                }
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
