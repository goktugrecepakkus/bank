<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rykard Banking - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cursor-copy {
            cursor: copy;
        }
    </style>
</head>

<body class="bg-[#0F2A1D] min-h-screen font-sans text-[#F2F2F2]">
    <!-- Navbar -->
    <nav class="bg-[#163D2C] border-b border-white/5 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center">
                    <span class="text-2xl font-black text-[#F2F2F2] tracking-tighter uppercase italic">Rykard<span
                            class="text-[#B08D57]">Bank</span></span>
                    <div class="hidden sm:ml-10 sm:flex sm:space-x-8">
                        <a href="dashboard.html"
                            class="border-transparent text-[#F2F2F2]/60 hover:text-[#F2F2F2] hover:border-[#B08D57]/30 inline-flex items-center px-1 pt-1 border-b-2 text-xs font-bold uppercase tracking-widest transition-all">Vault</a>
                        <a href="cards.html"
                            class="border-transparent text-[#F2F2F2]/60 hover:text-[#F2F2F2] hover:border-[#B08D57]/30 inline-flex items-center px-1 pt-1 border-b-2 text-xs font-bold uppercase tracking-widest transition-all">Relics</a>
                        <a href="settings.html"
                            class="border-[#B08D57] text-[#F2F2F2] inline-flex items-center px-1 pt-1 border-b-2 text-xs font-bold uppercase tracking-widest">Cipher</a>
                        <div id="adminLink" class="hidden">
                            <a href="admin.html"
                                class="border-transparent text-[#B08D57] hover:text-[#C9A76C] inline-flex items-center px-1 pt-1 border-b-2 text-xs font-bold uppercase tracking-widest transition-all">Overseer</a>
                        </div>
                    </div>
                </div>
                <div class="flex items-center">
                    <button onclick="logout()"
                        class="inline-flex items-center px-6 py-2 border border-[#B08D57]/30 text-[10px] font-bold rounded-full text-[#B08D57] hover:bg-[#B08D57] hover:text-[#0F2A1D] transition-all uppercase tracking-widest">
                        Depart
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto py-10 sm:px-6 lg:px-8">

        <div class="px-4 py-4 sm:px-0 mb-6">
            <h1 class="text-3xl font-bold text-gray-900">Account Settings</h1>
            <p class="mt-2 text-sm text-gray-600">Manage your security preferences and profile details.</p>
        </div>

        <div class="grid grid-cols-1 gap-10">
            <!-- Profile Section -->
            <div class="bg-[#163D2C] overflow-hidden rounded-[2.5rem] border border-white/5 shadow-2xl relative">
                <div class="p-10">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#B08D57]/5 blur-3xl rounded-full"></div>
                    <h2 class="text-[10px] font-bold text-[#F2F2F2]/40 uppercase tracking-[0.2em] mb-10">Security Cipher
                    </h2>

                    <form id="passwordForm" class="space-y-6 max-w-md">
                        <div>
                            <label
                                class="block text-[10px] font-bold text-[#F2F2F2]/40 uppercase tracking-[0.2em] mb-2 ml-1">Current
                                Keyphrase</label>
                            <input type="password" id="currentPassword" required
                                class="w-full px-5 py-4 bg-[#0F2A1D]/50 border border-white/5 rounded-2xl text-sm text-[#F2F2F2] focus:outline-none focus:border-[#B08D57] transition-all">
                        </div>
                        <div>
                            <label
                                class="block text-[10px] font-bold text-[#F2F2F2]/40 uppercase tracking-[0.2em] mb-2 ml-1">New
                                Keyphrase</label>
                            <input type="password" id="newPassword" required
                                class="w-full px-5 py-4 bg-[#0F2A1D]/50 border border-white/5 rounded-2xl text-sm text-[#F2F2F2] focus:outline-none focus:border-[#B08D57] transition-all">
                        </div>
                        <div>
                            <label
                                class="block text-[10px] font-bold text-[#F2F2F2]/40 uppercase tracking-[0.2em] mb-2 ml-1">Confirm
                                New Keyphrase</label>
                            <input type="password" id="confirmPassword" required
                                class="w-full px-5 py-4 bg-[#0F2A1D]/50 border border-white/5 rounded-2xl text-sm text-[#F2F2F2] focus:outline-none focus:border-[#B08D57] transition-all">
                        </div>

                        <div id="statusBox" class="hidden px-5 py-4 rounded-2xl text-xs font-bold text-center"></div>

                        <button type="submit"
                            class="w-full py-4 bg-[#B08D57] hover:bg-[#C9A76C] text-[#0F2A1D] rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shadow-[0_10px_20px_-10px_rgba(176,141,87,0.5)] active:scale-95">
                            Re-Forge Keyphrase
                        </button>
                    </form>
                </div>
            </div>

            <!-- Danger Zone -->
            <div
                class="bg-[#163D2C] overflow-hidden rounded-[2.5rem] border border-white/5 shadow-2xl relative border-rose-500/20">
                <div class="p-10">
                    <h2 class="text-[10px] font-bold text-rose-500/60 uppercase tracking-[0.2em] mb-6">Danger Protocol
                    </h2>
                    <p class="text-xs text-[#F2F2F2]/60 mb-8 max-w-xl">Initiating account dissolution is permanent. All
                        relics, essence, and archives will be irrevocably purged from the Eternal Reserve.</p>
                    <button
                        class="px-8 py-3 border border-rose-500/30 text-rose-500 hover:bg-rose-500/10 rounded-full text-[10px] font-black uppercase tracking-widest transition-all active:scale-95">
                        Relinquish Account
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('user_id');
        const userRole = localStorage.getItem('role');

        if (userRole === 'admin') {
            const adminLinkBtn = document.getElementById('adminLink');
            if (adminLinkBtn) adminLinkBtn.classList.remove('hidden');
        }

        if (!token) {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user_id');
            window.location.href = 'index.html';
        }

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const statusBox = document.getElementById('statusBox');
            const submitBtn = document.querySelector('#passwordForm button[type="submit"]');

            // Reset message box
            statusBox.className = 'hidden px-5 py-4 rounded-2xl text-xs font-bold text-center';

            if (newPassword !== confirmPassword) {
                statusBox.textContent = "New keyphrases do not match.";
                statusBox.classList.add('bg-rose-900/20', 'border', 'border-rose-500/50', 'text-rose-400', 'mb-6', 'block');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Re-Forging...';

            try {
                const response = await fetch('/api/customers/password', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        old_password: currentPassword,
                        new_password: newPassword
                    })
                });

                if (response.ok) {
                    statusBox.className = 'block px-5 py-4 rounded-2xl text-xs font-bold text-center bg-emerald-900/20 border border-emerald-500/50 text-emerald-400 mb-6';
                    statusBox.textContent = 'Keyphrase successfully re-forged.';
                    document.getElementById('passwordForm').reset();
                } else {
                    const data = await response.json();
                    statusBox.className = 'block px-5 py-4 rounded-2xl text-xs font-bold text-center bg-rose-900/20 border border-rose-500/50 text-rose-400 mb-6';
                    statusBox.textContent = data.detail || 'Failed to update keyphrase.';
                }
            } catch (err) {
                statusBox.textContent = "Network error. Could not connect to the server.";
                statusBox.classList.add('bg-rose-900/20', 'border', 'border-rose-500/50', 'text-rose-400', 'mb-6', 'block');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        });
    </script>
</body>

</html>
